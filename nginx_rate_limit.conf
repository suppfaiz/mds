# Nginx Rate Limiting Global Configuration
# Disalin ke: /etc/nginx/conf.d/rate_limit.conf
#
# Mendefinisikan zona memori 'login_limit' berukuran 10 megabyte (dapat menyimpan ~160.000 IP)
# Laju pengisian maksimal diatur 1 request per detik per alamat IP (rate=1r/s)

limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;
