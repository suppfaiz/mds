server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /root/mds;
    index index.php index.html index.htm;

    server_name _;
    autoindex off;

    # =========================================================
    # SECRET ADMIN PATH
    # Akses: http://192.168.200.142/01aac7d617a6d8b2
    #
    # Nginx langsung jalankan gate.php saat path ini diakses.
    # Tidak pakai rewrite — lebih simpel dan pasti bekerja.
    # =========================================================
    location ~ ^/01aac7d617a6d8b2 {
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /root/mds/gate.php;
        fastcgi_param REQUEST_URI     $request_uri;
        include       fastcgi_params;
    }

    # Blokir akses langsung ke gate.php via nama file
    location = /gate.php {
        return 404;
    }

    # =========================================================
    # ROUTE NORMAL
    # =========================================================
    location / {
        try_files $uri $uri/ =404;
    }

    # Uploads aman
    location ^~ /uploads/secure/ {
        deny all;
        return 403;
    }

    location ~* ^/uploads/.*\.(pdf|docx|xlsx|doc|xls|zip|rar|txt|csv)$ {
        deny all;
        return 403;
    }

    location ~* ^/uploads/.*\.php$ {
        deny all;
    }

    # Folder config & system tetap diblokir (disembunyikan dengan 404)
    location ^~ /config/ {
        deny all;
        return 404;
    }

    location ^~ /database/ {
        deny all;
        return 404;
    }

    location ^~ /includes/ {
        deny all;
        return 404;
    }

    # =========================================================
    # PHP Handler
    # Keamanan halaman admin (auth/login, dashboard_core, dll)
    # dijaga oleh PHP session — tidak perlu diblokir Nginx
    # =========================================================
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blokir file tersembunyi & sensitif
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(sh|bat|sql|bak|log|env)$ {
        deny all;
        return 404;
    }
}
