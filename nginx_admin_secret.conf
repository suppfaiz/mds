# ============================================================
# Nginx Secret Admin Path Configuration
# Master Data Sekolah - Security Config
#
# CARA PASANG DI SERVER:
#   1. Upload file ini ke: /etc/nginx/conf.d/mds-admin-secret.conf
#      ATAU tambahkan isi block 'server' ini ke dalam config Nginx
#      yang sudah ada di: /etc/nginx/sites-available/default
#
#   2. Test konfigurasi:  sudo nginx -t
#   3. Reload Nginx:      sudo systemctl reload nginx
#
# CARA AKSES ADMIN SETELAH INI:
#   DULU:  http://192.168.200.142/          → langsung ke admin
#   BARU:  http://192.168.200.142/          → redirect ke PMB (publik)
#          http://192.168.200.142/01aac7d617a6d8b2/  → admin panel
#
# GANTI "01aac7d617a6d8b2" dengan token rahasia Anda sendiri!
# ============================================================

server {
    listen 80;
    server_name _;  # Ganti dengan IP atau domain Anda

    # Root utama mengarah ke folder project
    root /var/www/mds/mds;
    index index.php;

    # -------------------------------------------------------
    # BAGIAN 1: Path publik yang boleh diakses siapa saja
    # -------------------------------------------------------

    # Halaman publik PMB (pendaftaran murid baru)
    location /pmb/ {
        try_files $uri $uri/ /pmb/index.php?$query_string;
    }

    # Portal orang tua (punya login sendiri)
    location /ortu/ {
        try_files $uri $uri/ =404;
    }

    # Assets publik (CSS, JS, gambar)
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPP invoice publik (untuk cetak kuitansi via token)
    location /spp/invoice.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # -------------------------------------------------------
    # BAGIAN 2: BLOKIR akses langsung ke admin lama
    # Jika ada yang coba akses /auth/ atau /index.php langsung → 404
    # -------------------------------------------------------

    # Blokir akses langsung ke auth/login.php via URL biasa
    location = /auth/login.php {
        return 404;
    }

    # Blokir akses langsung ke root index.php via URL /index.php
    # (mereka hanya boleh akses lewat path rahasia)
    location = /index.php {
        # Izinkan hanya request dari localhost atau yang punya session valid
        # Untuk simplicity: redirect ke PMB
        rewrite ^ /pmb/daftar.php redirect;
    }

    # Blokir akses langsung ke folder-folder admin
    location ~ ^/(siswa|guru|karyawan|kelas|presensi|rapor|spp|payroll|keuangan|pmb/index\.php|pmb/create|pmb/delete|pmb/detail|pmb/pengaturan|users|database|pengaturan|logs|api|auth|includes|config)/ {
        # Hanya boleh diakses jika request masuk via path rahasia
        # Cara: cek referer ATAU gunakan Nginx internal redirect
        internal;
    }

    # -------------------------------------------------------
    # BAGIAN 3: PATH RAHASIA ADMIN
    # Ubah "01aac7d617a6d8b2" menjadi token Anda sendiri!
    # -------------------------------------------------------

    # Gateway masuk admin — set cookie kemudian akses ke root PHP
    location ^~ /01aac7d617a6d8b2/ {
        # Hapus prefix path rahasia, teruskan ke root project
        alias /var/www/mds/mds/;

        # Untuk request ke /01aac7d617a6d8b2/ → muat index.php asli
        index admin_entry.php;

        location ~ \.php$ {
            # Perbaiki path: alias memerlukan fastcgi_param yang tepat
            fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
            fastcgi_index  admin_entry.php;
            include        snippets/fastcgi-php.conf;
            fastcgi_param  SCRIPT_FILENAME /var/www/mds/mds/$fastcgi_script_name;
            # Teruskan path rahasia sebagai header internal
            fastcgi_param  HTTP_X_ADMIN_PATH "01aac7d617a6d8b2";
        }
    }

    # -------------------------------------------------------
    # BAGIAN 4: Semua request PHP biasa (untuk admin setelah masuk)
    # Ini berjalan SETELAH session 'admin_gate' diverifikasi PHP
    # -------------------------------------------------------
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Blokir akses ke file sensitif
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    location ~ \.(sh|bat|sql|bak|log)$ {
        deny all;
    }
}
