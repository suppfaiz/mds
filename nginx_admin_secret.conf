server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/mds/mds;
    index index.php index.html index.htm;

    server_name _;
    autoindex off;

    # =========================================================
    # AKSES PUBLIK: PMB & Orang Tua
    # =========================================================
    location / {
        try_files $uri $uri/ =404;
    }

    # Uploads aman
    location /uploads/secure/ {
        deny all;
        return 403;
    }

    location ~* ^/uploads/.*\.(pdf|docx|xlsx|doc|xls|zip|rar|txt|csv)$ {
        deny all;
        return 403;
    }

    location ~* ^/uploads/.*\.php$ {
        deny all;
    }

    # Folder sensitif tetap diblokir
    location /config/ {
        deny all;
        return 403;
    }

    location /database/ {
        deny all;
        return 403;
    }

    location /includes/ {
        deny all;
        return 403;
    }

    # =========================================================
    # BLOKIR AKSES LANGSUNG KE HALAMAN ADMIN
    # Orang iseng yang tahu path-nya tetap tidak bisa masuk
    # =========================================================

    # Blokir /auth/login.php langsung → harus lewat gate dulu
    location = /auth/login.php {
        deny all;
        return 404;
    }

    # Blokir /dashboard_core.php langsung
    location = /dashboard_core.php {
        deny all;
        return 404;
    }

    # Blokir /gate.php langsung (hanya via internal rewrite)
    location = /gate.php {
        internal;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_GATE_TOKEN "01aac7d617a6d8b2";
        include fastcgi_params;
    }

    # =========================================================
    # SECRET ADMIN PATH
    # Akses: http://192.168.200.142/01aac7d617a6d8b2
    # Ganti "01aac7d617a6d8b2" jika mau path berbeda
    # =========================================================
    location ~ ^/01aac7d617a6d8b2(/.*)?$ {
        # Rewrite ke gate.php (internal, tidak bisa diakses langsung)
        rewrite ^ /gate.php last;
    }

    # =========================================================
    # PHP handler untuk semua file PHP lainnya
    # (admin pages: siswa, guru, dst. diproteksi PHP session)
    # =========================================================
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blokir file konfigurasi tersembunyi
    location ~ /\. {
        deny all;
    }

    # Blokir file sensitif lainnya
    location ~* \.(sh|bat|sql|bak|log|env)$ {
        deny all;
        return 404;
    }
}
